; Waveshare ESP32-S3-Touch-LCD-1.28 + 1.28" round GC9A01 (240x240)
; Board in Arduino IDE: "ESP32S3 Dev Module".
; Same hardware as the FlightTracker project; only the app layer differs.

[env:worldcup]
platform = espressif32@6.5.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
extra_scripts = post:scripts/merge_firmware.py

; Matches the known-good FlightTracker config: no forced PSRAM (a 240x240x2
; framebuffer is ~115 KB and fits in DRAM; forcing qio_opi can break boot on
; this board's PSRAM variant). CDC_ON_BOOT=0 keeps Serial logs on UART0.
build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=0
  -DWM_MDNS            ; guards the optional mDNS (worldcup.local) in wifi_setup

; Anti-aliased smooth font(s) embedded for the score/codes.
board_build.embed_files = data/ui_font.vlw

; Custom captive portal uses core DNSServer + WebServer (no WiFiManager dep).
lib_deps =
  lovyan03/LovyanGFX@^1.2.7
  bblanchon/ArduinoJson@^7.4.2
